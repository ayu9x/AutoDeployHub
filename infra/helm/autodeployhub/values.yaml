# ============================================
# AutoDeployHub Helm Values
# ============================================

namespace: autodeployhub

# -- Frontend --
frontend:
  replicaCount: 2
  image:
    repository: ""  # Set from ECR
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70
  env:
    NEXT_PUBLIC_API_URL: ""
    NEXT_PUBLIC_WS_URL: ""

# -- Backend --
backend:
  replicaCount: 2
  image:
    repository: ""
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPU: 70
  serviceAccount:
    name: backend-sa
    annotations: {}
  env:
    NODE_ENV: production
    DATABASE_URL: ""
    REDIS_HOST: ""
    REDIS_PORT: "6379"
    JWT_SECRET: ""
    JWT_REFRESH_SECRET: ""
    AWS_REGION: us-east-1
    AWS_S3_ARTIFACTS_BUCKET: ""
    AWS_S3_LOGS_BUCKET: ""

# -- Worker --
worker:
  replicaCount: 3
  image:
    repository: ""
    tag: "latest"
    pullPolicy: Always
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 60
  serviceAccount:
    name: worker-sa
    annotations: {}
  env:
    REDIS_HOST: ""
    REDIS_PORT: "6379"
    API_URL: ""
    AWS_REGION: us-east-1
    WORKER_CONCURRENCY: "5"

# -- Ingress --
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
  hosts:
    - host: ""
      paths:
        - path: /api
          service: backend
          port: 4000
        - path: /
          service: frontend
          port: 3000
