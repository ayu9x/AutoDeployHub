# ============================================
# CI Pipeline – Build, Test, Lint on PR
# ============================================

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  backend:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Lint
        run: npm run lint
        working-directory: apps/backend

      - name: Run tests
        run: npm test
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_HOST: localhost
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Build
        run: npm run build
        working-directory: apps/backend

  frontend:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Lint
        run: npm run lint
        working-directory: apps/frontend

      - name: Build
        run: npm run build
        working-directory: apps/frontend

  worker:
    name: Worker – Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...
        working-directory: apps/worker

      - name: Test
        run: go test ./...
        working-directory: apps/worker

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t autodeployhub/frontend:test ./apps/frontend

      - name: Build backend image
        run: docker build -t autodeployhub/backend:test ./apps/backend

      - name: Build worker image
        run: docker build -t autodeployhub/worker:test ./apps/worker

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform
